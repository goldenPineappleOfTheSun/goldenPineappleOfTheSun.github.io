# Канва сюжета

Средневековое тёмное фентези. В стране запретили магию.

Группа искателей приключений берёт задание у крестьян разведать кладбище и убить [некроманта](uchitel.html), но они проигрывают.

[Героя](geroy.html) уговаривают стать учеником некроманта; потом вскрывается, что и все мини-боссы, и [главный босс](glavnyj-boss.html) знакомы с учителем.

Героя учитель использует потому что у гг слабее магический след но большой потенциал - идея в том чтобы его быстро использовать а потом выбросить когда гг обнаружит армия

---

## Предыстория

Кто-то чтот-то сделал с женой [Короля](king.html) и тот запретил магию и активно использовал армию и ополчение, чтобы поймать как можно больше магов

Учитель был жрецом-врачевателем и состоял в группе [искателей приключений](../персонажи/old-team.html), Они были в довольно долгом путешествии и не застали новости. Кроме того учитель был мощным магом и его легко бы выследилили по магическомум следу. Чтобы его защитить (или защитить себя не знаю как лучше), команда провела обряд. (возможно от этого обряда он помер/проклялся хз) но так или иначе стал невидим для тех ищущих полицейских

---

## Основные события

[Обучение](tutorial.html) в лесу, где герои столкнутся с первым противником — медведем.

[Первая деревня](first-village.html) ну в начале в деревни они всречают мини босса только виде человека 

[Финал](finale.html) Когда игрок убивает короля немного рассказывает о тех боссов которых герой захватил и воскресил виде нежит.Воин узнаю что его деревня начинает процветает до она не процветает бывший жрец а сейчас лич  узнает что его церковь более популярной и он рад.Вампира стали расширяться и начали больше появляться ну орден( людей) про эльфов не помню там ещё есть королевский ловчий  его плюс вт ом что  животных стали меньше истреблять А учитель ГГ видит что больше и больше людей стало приходить на кладбище типа они его просят воскресить людей или хоят скелетов сделать  И там типв восседает новый король и он очень добрый

# Интриги

1.

Учитель знаком с боссами, так как они связаны со старым отрядом. После того как старый отряд спрятал учителя, тот немного поехал умом. Сначала он использовал гг, затем признался честно, что старая команда его предала. Но он ненадежный рассказчик. Со временем герой узнает, что на самом деле никто никого не предавал и учитель зря бесчинствовал
